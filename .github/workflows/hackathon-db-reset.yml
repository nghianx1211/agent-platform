name: Hackathon — DB Reset & Seed

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: 'Tenant slug (default: hackathon)'
        required: false
        default: 'hackathon'
      tenant_name:
        description: 'Tenant display name (defaults to slug)'
        required: false
        default: ''
      admin_email:
        description: 'Admin email'
        required: false
        default: 'admin@hackathon.com'
      password:
        description: 'Default password for seeded users'
        required: false
        default: 'ChangeMe@2026'
      only:
        description: 'Comma-separated phases to run: users,planner,availability (default: all)'
        required: false
        default: ''

concurrency:
  group: hackathon-db-seed
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  db-seed:
    name: Reset DB & seed demo data → ${{ github.event.inputs.tenant }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: SSH seed to EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          TENANT:       ${{ github.event.inputs.tenant }}
          TENANT_NAME:  ${{ github.event.inputs.tenant_name }}
          ADMIN_EMAIL:  ${{ github.event.inputs.admin_email }}
          SEED_PASSWORD: ${{ github.event.inputs.password }}
          ONLY:         ${{ github.event.inputs.only }}
        with:
          host:     ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs:     TENANT,TENANT_NAME,ADMIN_EMAIL,SEED_PASSWORD,ONLY
          script: |
            set -euo pipefail
            echo "=== Resetting DB and seeding tenant: $TENANT ==="

            ARGS="--tenant $TENANT --admin-email $ADMIN_EMAIL --password $SEED_PASSWORD"
            [ -n "$TENANT_NAME" ]  && ARGS="$ARGS --tenant-name $TENANT_NAME"
            [ -n "$ONLY" ]         && ARGS="$ARGS --only $ONLY"

            cd /opt/platform

            echo "--- Stopping stack and wiping volumes ---"
            docker compose --env-file /opt/seta/.env down -v

            echo "--- Starting postgres ---"
            docker compose --env-file /opt/seta/.env up -d postgres

            echo "--- Running migrations ---"
            docker compose --env-file /opt/seta/.env run --rm migrator

            echo "--- Seeding data ---"
            docker compose --env-file /opt/seta/.env run --rm \
              -e DATABASE_URL \
              seeder seed $ARGS

            echo "--- Bringing stack back up ---"
            docker compose --env-file /opt/seta/.env up -d

            echo "=== Reset and seed complete ==="
